<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak 🌙</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700;900&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --green:#00ff88;
    --green2:#00cc66;
    --green3:#004422;
    --green4:#00ff6620;
    --gold:#ffd700;
    --dark:#000000;
  }
  body{
    background:#000;
    color:var(--green);
    font-family:'Noto Serif Bengali',serif;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* Stars background */
  .stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) infinite alternate}
  @keyframes twinkle{0%{opacity:.1;transform:scale(1)}100%{opacity:1;transform:scale(1.3)}}

  /* Page sections */
  #page-create, #page-card{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    z-index:1;
    padding:2rem 1rem;
  }
  #page-card{display:none}

  /* 3D Title */
  .title-3d{
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(2rem,5vw,4rem);
    color:var(--green);
    text-align:center;
    text-shadow:
      0 0 10px var(--green),
      0 0 20px var(--green),
      0 0 40px var(--green2),
      2px 2px 0 #003322,
      4px 4px 0 #002211,
      6px 6px 0 #001100,
      8px 8px 15px rgba(0,0,0,.8);
    animation:float 4s ease-in-out infinite;
    letter-spacing:.05em;
    margin-bottom:.5rem;
  }
  .subtitle{
    font-family:'Amiri',serif;
    font-size:clamp(1.2rem,3vw,1.8rem);
    color:var(--gold);
    text-align:center;
    text-shadow:0 0 15px var(--gold);
    margin-bottom:3rem;
    font-style:italic;
  }
  @keyframes float{
    0%,100%{transform:translateY(0) rotateX(0deg)}
    50%{transform:translateY(-10px) rotateX(3deg)}
  }

  /* Form card */
  .form-box{
    background:linear-gradient(135deg,rgba(0,20,10,.9) 0%,rgba(0,40,20,.85) 100%);
    border:1px solid var(--green2);
    border-radius:20px;
    padding:2.5rem 2rem;
    width:100%;
    max-width:520px;
    box-shadow:
      0 0 30px rgba(0,255,100,.15),
      0 0 60px rgba(0,255,100,.07),
      inset 0 1px 0 rgba(0,255,136,.2);
    position:relative;
    overflow:hidden;
  }
  .form-box::before{
    content:'';
    position:absolute;
    top:-50%;left:-50%;
    width:200%;height:200%;
    background:radial-gradient(ellipse at 60% 40%,rgba(0,255,100,.04) 0%,transparent 60%);
    animation:shimmer 6s linear infinite;
    pointer-events:none;
  }
  @keyframes shimmer{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

  .form-group{margin-bottom:1.5rem}
  label{
    display:block;
    font-size:.9rem;
    color:var(--green2);
    margin-bottom:.5rem;
    letter-spacing:.05em;
  }
  input, textarea, select{
    width:100%;
    background:rgba(0,255,100,.05);
    border:1px solid var(--green3);
    border-radius:10px;
    color:var(--green);
    font-family:'Noto Serif Bengali',serif;
    font-size:1rem;
    padding:.75rem 1rem;
    outline:none;
    transition:all .3s;
  }
  input:focus, textarea:focus{
    border-color:var(--green2);
    box-shadow:0 0 15px rgba(0,255,100,.2);
    background:rgba(0,255,100,.08);
  }
  textarea{resize:vertical;min-height:100px}
  input::placeholder, textarea::placeholder{color:rgba(0,255,100,.3)}

  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:.5rem;
    background:linear-gradient(135deg,#003322,#005533);
    color:var(--green);
    border:1px solid var(--green2);
    border-radius:12px;
    padding:.9rem 2rem;
    font-family:'Noto Serif Bengali',serif;
    font-size:1rem;
    cursor:pointer;
    transition:all .3s;
    text-shadow:0 0 8px var(--green);
    box-shadow:0 0 20px rgba(0,255,100,.15);
    width:100%;
    font-weight:600;
    position:relative;
    overflow:hidden;
  }
  .btn::after{
    content:'';
    position:absolute;
    top:0;left:-100%;
    width:100%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(0,255,100,.1),transparent);
    transition:.5s;
  }
  .btn:hover::after{left:100%}
  .btn:hover{
    background:linear-gradient(135deg,#004433,#007744);
    box-shadow:0 0 30px rgba(0,255,100,.3);
    transform:translateY(-2px);
  }
  .btn:active{transform:translateY(0)}

  /* Link box */
  .link-box{
    margin-top:1.5rem;
    background:rgba(0,255,100,.05);
    border:1px solid var(--green3);
    border-radius:12px;
    padding:1rem;
    display:none;
  }
  .link-box.show{display:block}
  .link-label{font-size:.8rem;color:var(--green2);margin-bottom:.5rem}
  .link-row{display:flex;gap:.5rem;align-items:center}
  .link-text{
    flex:1;
    background:transparent;
    border:none;
    color:var(--green);
    font-size:.85rem;
    font-family:monospace;
    word-break:break-all;
    cursor:text;
    padding:.25rem;
  }
  .copy-btn{
    background:var(--green3);
    color:var(--green);
    border:1px solid var(--green2);
    border-radius:8px;
    padding:.4rem .8rem;
    font-size:.8rem;
    cursor:pointer;
    white-space:nowrap;
    transition:all .3s;
  }
  .copy-btn:hover{background:#005533}
  .copy-success{color:var(--gold);font-size:.8rem;margin-top:.5rem;display:none}

  /* ========= CARD PAGE ========= */
  .card-wrap{
    perspective:1200px;
    width:100%;
    max-width:600px;
    padding:0 1rem;
  }
  .card-3d{
    background:linear-gradient(145deg,#000d05,#001a0a,#000d05);
    border:1px solid var(--green2);
    border-radius:24px;
    padding:3rem 2.5rem;
    box-shadow:
      0 0 40px rgba(0,255,100,.2),
      0 0 80px rgba(0,255,100,.1),
      0 25px 50px rgba(0,0,0,.8),
      inset 0 1px 0 rgba(0,255,136,.15);
    animation:card-float 5s ease-in-out infinite;
    transform-style:preserve-3d;
    position:relative;
    overflow:hidden;
  }
  @keyframes card-float{
    0%,100%{transform:rotateX(2deg) rotateY(-2deg) translateY(0)}
    25%{transform:rotateX(-1deg) rotateY(2deg) translateY(-8px)}
    50%{transform:rotateX(2deg) rotateY(1deg) translateY(-4px)}
    75%{transform:rotateX(-2deg) rotateY(-1deg) translateY(-10px)}
  }

  /* Decorative corners */
  .corner{position:absolute;width:60px;height:60px;opacity:.4}
  .corner-tl{top:12px;left:12px;border-top:2px solid var(--green);border-left:2px solid var(--green)}
  .corner-tr{top:12px;right:12px;border-top:2px solid var(--green);border-right:2px solid var(--green)}
  .corner-bl{bottom:12px;left:12px;border-bottom:2px solid var(--green);border-left:2px solid var(--green)}
  .corner-br{bottom:12px;right:12px;border-bottom:2px solid var(--green);border-right:2px solid var(--green)}

  /* Moon & Mosque SVG */
  .eid-art{text-align:center;margin-bottom:1.5rem;filter:drop-shadow(0 0 20px rgba(0,255,100,.5))}
  .eid-art svg{width:180px;height:auto}

  .card-to{
    text-align:center;
    font-size:1rem;
    color:rgba(0,255,100,.6);
    margin-bottom:.25rem;
    letter-spacing:.1em;
  }
  .card-name{
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(1.8rem,5vw,3rem);
    color:var(--green);
    text-align:center;
    text-shadow:
      0 0 10px var(--green),
      0 0 25px var(--green2),
      3px 3px 0 #002211,
      6px 6px 10px rgba(0,0,0,.6);
    margin-bottom:1.5rem;
  }
  .card-arabic{
    font-family:'Amiri',serif;
    font-size:clamp(1.5rem,4vw,2.2rem);
    color:var(--gold);
    text-align:center;
    text-shadow:0 0 20px rgba(255,215,0,.6);
    margin-bottom:.5rem;
    direction:rtl;
  }
  .card-eid{
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(1.2rem,3.5vw,1.8rem);
    color:var(--green);
    text-align:center;
    text-shadow:0 0 15px var(--green);
    margin-bottom:2rem;
    letter-spacing:.1em;
  }
  .card-divider{
    width:80%;
    height:1px;
    background:linear-gradient(90deg,transparent,var(--green2),transparent);
    margin:0 auto 2rem;
    box-shadow:0 0 8px var(--green2);
  }
  .card-msg{
    font-family:'Noto Serif Bengali',serif;
    font-size:clamp(1rem,2.5vw,1.15rem);
    color:rgba(0,255,136,.85);
    text-align:center;
    line-height:1.8;
    padding:0 .5rem;
    margin-bottom:2rem;
  }
  .card-from-label{font-size:.85rem;color:rgba(0,255,100,.4);text-align:center;margin-bottom:.25rem}
  .card-from{
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(1rem,2.5vw,1.4rem);
    color:var(--gold);
    text-align:center;
    text-shadow:0 0 10px var(--gold);
  }

  /* Floating particles */
  .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .particle{
    position:absolute;
    width:4px;height:4px;
    background:var(--green);
    border-radius:50%;
    animation:rise var(--d) linear infinite;
    opacity:0;
    box-shadow:0 0 6px var(--green);
  }
  @keyframes rise{
    0%{transform:translateY(100vh) scale(0);opacity:0}
    10%{opacity:.8}
    90%{opacity:.3}
    100%{transform:translateY(-20vh) scale(1.5);opacity:0}
  }

  /* Share button */
  .share-section{margin-top:2rem;text-align:center}
  .share-btn{
    display:inline-flex;align-items:center;gap:.5rem;
    background:transparent;
    border:1px solid var(--green2);
    color:var(--green2);
    border-radius:10px;
    padding:.6rem 1.5rem;
    font-size:.9rem;
    cursor:pointer;
    transition:all .3s;
    font-family:'Noto Serif Bengali',serif;
  }
  .share-btn:hover{background:rgba(0,255,100,.1);color:var(--green)}

  /* Moon orbit animation on card */
  .moon-orbit{
    animation:orbit 8s linear infinite;
    transform-origin:50% 50%;
  }
  @keyframes orbit{
    0%{transform:rotate(0deg) translateX(30px) rotate(0deg)}
    100%{transform:rotate(360deg) translateX(30px) rotate(-360deg)}
  }
  .lantern-sway{animation:sway 3s ease-in-out infinite alternate}
  @keyframes sway{0%{transform:rotate(-5deg)}100%{transform:rotate(5deg)}}

  /* Responsive */
  @media(max-width:480px){
    .form-box,.card-3d{padding:1.75rem 1.25rem}
    .title-3d{font-size:1.8rem}
  }

  /* Firefly */
  .firefly{
    position:fixed;width:5px;height:5px;
    background:var(--green);border-radius:50%;
    box-shadow:0 0 8px var(--green),0 0 20px var(--green2);
    pointer-events:none;z-index:0;
    animation:fly var(--d) ease-in-out infinite alternate;
  }
  @keyframes fly{
    0%{transform:translate(0,0);opacity:.2}
    50%{opacity:1}
    100%{transform:translate(var(--tx),var(--ty));opacity:.3}
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>
<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- ===== CREATE PAGE ===== -->
<div id="page-create">
  <div class="title-3d">🌙 Eid Mubarak 🌙</div>
  <div class="subtitle">ঈদের শুভেচ্ছা পাঠান আপনার প্রিয়জনকে</div>

  <div class="form-box">
    <div class="form-group">
      <label>আপনার নাম (প্রেরক)</label>
      <input type="text" id="sender" placeholder="আপনার নাম লিখুন..." />
    </div>
    <div class="form-group">
      <label>প্রাপকের নাম (যাকে পাঠাবেন)</label>
      <input type="text" id="receiver" placeholder="বন্ধু বা পরিবারের নাম..." />
    </div>
    <div class="form-group">
      <label>শুভেচ্ছা বার্তা</label>
      <textarea id="message" placeholder="আপনার হৃদয়ের কথা লিখুন...">এই পবিত্র ঈদে আপনার জীবন হোক আনন্দময়, সুখ ও শান্তিতে ভরপুর। আল্লাহ আপনার সমস্ত দোয়া কবুল করুন। ঈদ মোবারক! 🌙✨</textarea>
    </div>
    <button class="btn" onclick="generateLink()">
      🔗 লিংক তৈরি করুন
    </button>

    <div class="link-box" id="linkBox">
      <div class="link-label">✅ আপনার ঈদ কার্ডের লিংক তৈরি হয়েছে!</div>
      <div class="link-row">
        <input class="link-text" type="text" id="linkText" readonly />
        <button class="copy-btn" onclick="copyLink()">কপি করুন</button>
      </div>
      <div class="copy-success" id="copySuccess">✓ লিংক কপি হয়েছে!</div>
      <div style="margin-top:1rem">
        <button class="btn" style="background:linear-gradient(135deg,#002211,#004422)" onclick="previewCard()">
          👁 কার্ড দেখুন
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===== CARD PAGE ===== -->
<div id="page-card">
  <div class="card-wrap">
    <div class="card-3d">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="eid-art">
        <svg viewBox="0 0 300 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Night sky glow -->
          <ellipse cx="150" cy="60" rx="120" ry="50" fill="rgba(0,255,100,0.03)"/>
          <!-- Stars -->
          <circle cx="30" cy="20" r="1.5" fill="#00ff88" opacity=".8"><animate attributeName="opacity" values=".3;1;.3" dur="2s" repeatCount="indefinite"/></circle>
          <circle cx="270" cy="15" r="1" fill="#00ff88" opacity=".6"><animate attributeName="opacity" values=".6;1;.6" dur="1.5s" repeatCount="indefinite"/></circle>
          <circle cx="200" cy="10" r="2" fill="#ffd700" opacity=".7"><animate attributeName="opacity" values=".4;1;.4" dur="2.5s" repeatCount="indefinite"/></circle>
          <circle cx="80" cy="8" r="1" fill="#00ff88"><animate attributeName="opacity" values=".5;1;.5" dur="1.8s" repeatCount="indefinite"/></circle>
          <circle cx="240" cy="35" r="1.5" fill="#ffd700" opacity=".5"><animate attributeName="opacity" values=".3;.9;.3" dur="3s" repeatCount="indefinite"/></circle>

          <!-- Crescent Moon -->
          <g transform="translate(125,25)">
            <circle cx="30" cy="30" r="28" fill="#001a08"/>
            <path d="M30 4 C14 4 2 16 2 30 C2 44 14 56 30 56 C20 50 14 41 14 30 C14 19 20 10 30 4Z" fill="#00ff88" opacity=".9"/>
            <path d="M30 4 C44 4 56 16 56 30 C56 44 44 56 30 56" fill="none" stroke="#00ff88" stroke-width="1" opacity=".3"/>
          </g>
          
          <!-- Star next to moon -->
          <g transform="translate(175,15)">
            <polygon points="8,0 10,6 16,6 11,10 13,16 8,12 3,16 5,10 0,6 6,6" fill="#ffd700" opacity=".9">
              <animateTransform attributeName="transform" type="rotate" values="0 8 8;360 8 8" dur="10s" repeatCount="indefinite"/>
            </polygon>
          </g>

          <!-- Mosque silhouette -->
          <g transform="translate(60,70)" fill="#00cc66" opacity=".8">
            <!-- Main dome -->
            <ellipse cx="90" cy="45" rx="25" ry="22" fill="#003319"/>
            <path d="M65 45 Q90 15 115 45" fill="#00aa55"/>
            <!-- Minaret left -->
            <rect x="20" y="30" width="12" height="60" fill="#004422"/>
            <ellipse cx="26" cy="30" rx="8" ry="10" fill="#005533"/>
            <polygon points="22,20 26,8 30,20" fill="#00ff88"/>
            <!-- Minaret right -->
            <rect x="148" y="30" width="12" height="60" fill="#004422"/>
            <ellipse cx="154" cy="30" rx="8" ry="10" fill="#005533"/>
            <polygon points="150,20 154,8 158,20" fill="#00ff88"/>
            <!-- Main building -->
            <rect x="55" y="55" width="70" height="35" fill="#004422"/>
            <!-- Door arch -->
            <path d="M81 90 L81 72 Q90 63 99 72 L99 90 Z" fill="#001a0a"/>
            <!-- Windows -->
            <ellipse cx="68" cy="68" rx="5" ry="6" fill="none" stroke="#00ff88" stroke-width="1"/>
            <ellipse cx="112" cy="68" rx="5" ry="6" fill="none" stroke="#00ff88" stroke-width="1"/>
            <!-- Ground line -->
            <rect x="0" y="88" width="180" height="3" fill="#005533" rx="1"/>
          </g>

          <!-- Lanterns -->
          <g transform="translate(20,60)" class="lantern-sway">
            <rect x="2" y="5" width="14" height="22" rx="3" fill="none" stroke="#ffd700" stroke-width="1.5" opacity=".7"/>
            <line x1="9" y1="0" x2="9" y2="5" stroke="#ffd700" stroke-width="1.5" opacity=".7"/>
            <circle cx="9" cy="16" r="4" fill="#ffd700" opacity=".3"><animate attributeName="opacity" values=".2;.5;.2" dur="2s" repeatCount="indefinite"/></circle>
          </g>
          <g transform="translate(265,55)" class="lantern-sway" style="animation-delay:1s">
            <rect x="2" y="5" width="14" height="22" rx="3" fill="none" stroke="#ffd700" stroke-width="1.5" opacity=".7"/>
            <line x1="9" y1="0" x2="9" y2="5" stroke="#ffd700" stroke-width="1.5" opacity=".7"/>
            <circle cx="9" cy="16" r="4" fill="#ffd700" opacity=".3"><animate attributeName="opacity" values=".3;.6;.3" dur="2.5s" repeatCount="indefinite"/></circle>
          </g>

          <!-- Bottom decorative line -->
          <line x1="40" y1="155" x2="260" y2="155" stroke="#00ff88" stroke-width=".5" opacity=".4"/>
          <circle cx="150" cy="155" r="3" fill="#00ff88" opacity=".6"/>
        </svg>
      </div>

      <div class="card-to">শুভেচ্ছা জানানো হচ্ছে</div>
      <div class="card-name" id="cardReceiver">প্রিয়জন</div>

      <div class="card-arabic">عِيدٌ مُبَارَكٌ</div>
      <div class="card-eid">Eid Mubarak</div>

      <div class="card-divider"></div>

      <div class="card-msg" id="cardMessage">আপনার জন্য শুভেচ্ছা...</div>

      <div class="card-divider"></div>

      <div class="card-from-label">ভালোবাসা সহ</div>
      <div class="card-from" id="cardSender">—</div>
    </div>

    <div class="share-section">
      <button class="share-btn" onclick="goBack()">← নতুন কার্ড তৈরি করুন</button>
      &nbsp;
      <button class="share-btn" onclick="shareCard()">↗ শেয়ার করুন</button>
    </div>
  </div>
</div>

<!-- Fireflies -->
<div id="fireflies"></div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for(let i=0;i<120;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2+.5}px;height:${Math.random()*2+.5}px;opacity:${Math.random()};--d:${Math.random()*3+1}s;animation-delay:${Math.random()*3}s`;
  starsEl.appendChild(s);
}

// Particles
const pEl=document.getElementById('particles');
for(let i=0;i<25;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.cssText=`left:${Math.random()*100}%;--d:${Math.random()*8+6}s;animation-delay:${Math.random()*8}s;width:${Math.random()*4+2}px;height:${Math.random()*4+2}px`;
  pEl.appendChild(p);
}

// Fireflies
const ffEl=document.getElementById('fireflies');
for(let i=0;i<12;i++){
  const f=document.createElement('div');
  f.className='firefly';
  const tx=(Math.random()-0.5)*200;
  const ty=(Math.random()-0.5)*200;
  f.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*6+4}s;--tx:${tx}px;--ty:${ty}px;animation-delay:${Math.random()*5}s`;
  ffEl.appendChild(f);
}

// Check URL params on load
window.addEventListener('load',()=>{
  const params=new URLSearchParams(window.location.search);
  const r=params.get('to');
  const s=params.get('from');
  const m=params.get('msg');
  if(r&&s){
    showCard(decodeURIComponent(r),decodeURIComponent(s),m?decodeURIComponent(m):'ঈদ মোবারক! আপনার জীবন সুখ ও আনন্দে ভরে উঠুক।');
  }
});

function generateLink(){
  const sender=document.getElementById('sender').value.trim();
  const receiver=document.getElementById('receiver').value.trim();
  const message=document.getElementById('message').value.trim();
  if(!sender||!receiver){
    alert('অনুগ্রহ করে আপনার নাম এবং প্রাপকের নাম লিখুন।');
    return;
  }
  const base=window.location.href.split('?')[0];
  const link=`${base}?to=${encodeURIComponent(receiver)}&from=${encodeURIComponent(sender)}&msg=${encodeURIComponent(message)}`;
  document.getElementById('linkText').value=link;
  const lb=document.getElementById('linkBox');
  lb.classList.add('show');
  lb.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function copyLink(){
  const t=document.getElementById('linkText');
  t.select();
  try{
    navigator.clipboard.writeText(t.value);
  }catch(e){
    document.execCommand('copy');
  }
  const s=document.getElementById('copySuccess');
  s.style.display='block';
  setTimeout(()=>s.style.display='none',2500);
}

function previewCard(){
  const sender=document.getElementById('sender').value.trim();
  const receiver=document.getElementById('receiver').value.trim();
  const message=document.getElementById('message').value.trim();
  showCard(receiver,sender,message);
}

function showCard(receiver,sender,message){
  document.getElementById('cardReceiver').textContent=receiver||'প্রিয়জন';
  document.getElementById('cardSender').textContent=sender||'—';
  document.getElementById('cardMessage').textContent=message||'ঈদ মোবারক!';
  document.getElementById('page-create').style.display='none';
  document.getElementById('page-card').style.display='flex';
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  document.getElementById('page-card').style.display='none';
  document.getElementById('page-create').style.display='flex';
}

function shareCard(){
  const link=document.getElementById('linkText').value;
  if(!link){
    alert('প্রথমে লিংক তৈরি করুন।');
    goBack();
    return;
  }
  if(navigator.share){
    navigator.share({title:'ঈদ মোবারক!',text:'আপনার জন্য একটি বিশেষ ঈদ কার্ড',url:link});
  }else{
    navigator.clipboard.writeText(link).then(()=>alert('লিংক কপি হয়েছে! বন্ধুদের পাঠিয়ে দিন।'));
  }
}
</script>
</body>
</html>
